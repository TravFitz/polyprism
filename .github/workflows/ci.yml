name: CI

on:
  pull_request:
  push:
    branches: [main]

# Cancel superseded runs on the same PR/branch — CI minutes are not free.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  # Lint, typecheck, tests, build. Single Node + Prisma version — the test
  # suite builds IR by hand and never invokes prisma generate, so it is
  # Prisma-version-agnostic. Running it twice in a matrix would just burn
  # minutes without adding signal.
  check:
    name: Lint + typecheck + test + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint + format check
        # `pnpm ci` is a reserved pnpm subcommand that errors with
        # "not implemented yet" instead of running our root script.
        # `pnpm run ci` forces script lookup.
        run: pnpm run ci

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

  # The point of this matrix is to catch DMMF divergences between Prisma
  # majors — DMMF is officially unstable and is exactly the thing PolyPrism
  # has to be robust against. Each matrix cell regenerates every example
  # schema with `prisma generate`, then typechecks the output.
  #
  # Schema layout: the example fixtures use the Prisma 7 layout (no `url`
  # in `datasource db { ... }`; URL lives in `prisma.config.ts`). The
  # Prisma 6 matrix cell mutates the schemas at run time to inject `url`
  # back — Prisma 6 hard-requires it in the schema and doesn't read
  # `prisma.config.ts` for the datasource. Both schema variants produce
  # identical DMMF for the model graph, so this is purely a config-shape
  # adapter; the actual generator code is exercised identically.
  examples:
    name: Generate examples (Prisma ${{ matrix.prisma }})
    runs-on: ubuntu-latest
    needs: check
    strategy:
      fail-fast: false
      matrix:
        prisma: ["6", "7"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        # pnpm 9 won't create bin symlinks for workspace packages whose bin
        # target (e.g. `./dist/generator.js`) doesn't exist yet at install
        # time. It logs a `WARN Failed to create bin at ...` and continues
        # without the symlink — which then makes `prisma generate` fail with
        # `/bin/sh: polyprism-ts-X: not found` even after we build below.
        # The fix is a second install after build (further down) to re-link
        # the bins now that their targets exist.
        run: pnpm install --frozen-lockfile

      - name: Pin Prisma to ^${{ matrix.prisma }}.0.0 across the workspace
        run: pnpm -r update "prisma@^${{ matrix.prisma }}.0.0"

      - name: Build PolyPrism packages
        run: pnpm build

      - name: Re-link workspace bins now that dist/ exists
        # See the install step above for the why. With dist/ files present,
        # this install pass creates the bin symlinks pnpm warned about and
        # otherwise skipped on the first install.
        run: pnpm install --frozen-lockfile

      - name: Adapt example schemas for Prisma 6
        # Fixtures are canonically the Prisma 7 layout — no `url` in the
        # schema's datasource block. Prisma 6 hard-rejects that shape, so
        # for this cell we inject `url = env("DATABASE_URL")` back right
        # after `provider = "postgresql"` in every example. Prisma 6 reads
        # url from the schema and ignores prisma.config.ts's datasource.url
        # (it still loads the file — just doesn't use the URL from it).
        #
        # Each schema is grep-validated first so that if anyone ever runs
        # `prisma format` or otherwise reformats the line, the sed silent-
        # miss doesn't get re-discovered as `Argument "url" is missing`
        # five minutes into CI. Fail loudly instead.
        if: matrix.prisma == '6'
        run: |
          set -euo pipefail
          for schema in examples/*/prisma/schema.prisma; do
            if ! grep -q '^  provider = "postgresql"$' "$schema"; then
              echo "::error file=$schema::schema-adapter regex no longer matches — the datasource line layout has changed, update the sed pattern in .github/workflows/ci.yml" >&2
              exit 1
            fi
            sed -i 's|^  provider = "postgresql"$|&\n  url      = env("DATABASE_URL")|' "$schema"
            echo "::group::Adapted $schema"
            sed -n '/^datasource db/,/^}/p' "$schema"
            echo "::endgroup::"
          done

      - name: Regenerate every example schema
        run: pnpm -F "polyprism-example-*" generate

      - name: Typecheck the generated output
        # Each self-contained example's generated/ directory must compile
        # under strict TS with the same compiler options consumers will use.
        # complex-ecommerce is excluded because it deliberately exercises
        # the bare and with-path `@json` forms — those reference types the
        # CONSUMER provides (`@json(SeoMeta)`, `@json(X from "./types/...")`),
        # so its generated output is intentionally not self-resolving.
        run: |
          set -e
          for example in examples/simple-blog/generated examples/task-tracker/generated; do
            echo "::group::Typecheck $example"
            find "$example" -name "*.ts" -type f -print0 \
              | xargs -0 ./node_modules/.bin/tsc \
                --target ES2022 \
                --module ESNext \
                --moduleResolution Bundler \
                --strict \
                --noEmit
            echo "::endgroup::"
          done
