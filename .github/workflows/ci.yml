name: CI

on:
  pull_request:
  push:
    branches: [main]

# Cancel superseded runs on the same PR/branch — CI minutes are not free.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  # Lint, typecheck, tests, build. Single Node + Prisma version — the test
  # suite builds IR by hand and never invokes prisma generate, so it is
  # Prisma-version-agnostic. Running it twice in a matrix would just burn
  # minutes without adding signal.
  check:
    name: Lint + typecheck + test + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint + format check
        # `pnpm ci` is a reserved pnpm subcommand that errors with
        # "not implemented yet" instead of running our root script.
        # `pnpm run ci` forces script lookup.
        run: pnpm run ci

      - name: Typecheck
        run: pnpm typecheck

      # Build must run BEFORE Test. `@polyprism/runtime`'s CJS-load test
      # (`packages/runtime/tests/cjs-load.test.ts`) asserts that `dist/index.cjs`
      # exists so a regression where the dual ESM+CJS build silently drops the
      # CJS sibling gets caught loud. On a fresh CI checkout dist/ doesn't
      # exist yet — running Test before Build would hard-fail that assertion
      # on every CI run regardless of code state. Reordering means the build
      # artifacts are real by the time anything inspects them.
      #
      # (Historical footnote: this repo's first push shipped broken CI for
      # the inverse reason — typecheck passed locally because prior build
      # runs had populated dist/, but the clean-install CI run had no dist
      # and failed. Same shape of bug, opposite direction.)
      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test

  # The point of this matrix is to catch DMMF divergences between Prisma
  # majors — DMMF is officially unstable and is exactly the thing PolyPrism
  # has to be robust against. Each matrix cell regenerates every example
  # schema with `prisma generate`, then typechecks the output.
  #
  # Schema layout: the example fixtures use the Prisma 7 layout (no `url`
  # in `datasource db { ... }`; URL lives in `prisma.config.ts`). The
  # Prisma 6 matrix cell mutates the schemas at run time to inject `url`
  # back — Prisma 6 hard-requires it in the schema and doesn't read
  # `prisma.config.ts` for the datasource. Both schema variants produce
  # identical DMMF for the model graph, so this is purely a config-shape
  # adapter; the actual generator code is exercised identically.
  examples:
    name: Generate examples (Prisma ${{ matrix.prisma }})
    runs-on: ubuntu-latest
    needs: check
    strategy:
      fail-fast: false
      matrix:
        prisma: ["6", "7"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        # pnpm 9 won't create bin symlinks for workspace packages whose bin
        # target (e.g. `./dist/generator.js`) doesn't exist yet at install
        # time. It logs a `WARN Failed to create bin at ...` and continues
        # without the symlink — which then makes `prisma generate` fail with
        # `/bin/sh: polyprism-ts-X: not found` even after we build below.
        # The fix is a second install after build (further down) to re-link
        # the bins now that their targets exist.
        run: pnpm install --frozen-lockfile

      - name: Pin Prisma to ^${{ matrix.prisma }}.0.0 across the workspace
        run: pnpm -r update "prisma@^${{ matrix.prisma }}.0.0"

      - name: Build PolyPrism packages
        run: pnpm build

      - name: Re-link workspace bins now that dist/ exists
        # See the install step above for the why. With dist/ files present,
        # this install pass creates the bin symlinks pnpm warned about and
        # otherwise skipped on the first install.
        run: pnpm install --frozen-lockfile

      - name: Adapt example schemas for Prisma 6
        # Fixtures are canonically the Prisma 7 layout — no `url` in the
        # schema's datasource block. Prisma 6 hard-rejects that shape, so
        # for this cell we inject `url = env("DATABASE_URL")` back right
        # after `provider = "postgresql"` in every example. Prisma 6 reads
        # url from the schema and ignores prisma.config.ts's datasource.url
        # (it still loads the file — just doesn't use the URL from it).
        #
        # Each schema is grep-validated first so that if anyone ever runs
        # `prisma format` or otherwise reformats the line, the sed silent-
        # miss doesn't get re-discovered as `Argument "url" is missing`
        # five minutes into CI. Fail loudly instead.
        if: matrix.prisma == '6'
        run: |
          set -euo pipefail
          for schema in examples/*/*/prisma/schema.prisma; do
            if ! grep -q '^  provider = "postgresql"$' "$schema"; then
              echo "::error file=$schema::schema-adapter regex no longer matches — the datasource line layout has changed, update the sed pattern in .github/workflows/ci.yml" >&2
              exit 1
            fi
            sed -i 's|^  provider = "postgresql"$|&\n  url      = env("DATABASE_URL")|' "$schema"
            echo "::group::Adapted $schema"
            sed -n '/^datasource db/,/^}/p' "$schema"
            echo "::endgroup::"
          done

      - name: Regenerate every example schema
        run: pnpm -F "polyprism-example-*" generate

      - name: Typecheck the generated output
        # Each self-contained example's generated/ directory must compile
        # under strict TS with the same compiler options consumers will use.
        # complex-ecommerce is excluded because it deliberately exercises
        # the bare and with-path `@json` forms — those reference types the
        # CONSUMER provides (`@json(SeoMeta)`, `@json(X from "./types/...")`),
        # so its generated output is intentionally not self-resolving.
        # php-* examples are excluded because they emit PHP, not TS — they
        # have their own lint + smoke steps further down.
        run: |
          set -e
          for example in examples/ts/simple-blog/generated examples/ts/task-tracker/generated examples/ts/domain-class-showcase/generated; do
            echo "::group::Typecheck $example"
            find "$example" -name "*.ts" -type f -print0 \
              | xargs -0 ./node_modules/.bin/tsc \
                --target ES2022 \
                --module ESNext \
                --moduleResolution Bundler \
                --strict \
                --noEmit
            echo "::endgroup::"
          done

      # PHP showcase: parse-check every emitted .php file under both the
      # documented floor (PHP 8.1, the php-class baseline) AND the latest
      # supported stable (PHP 8.2). 8.1 catches accidental use of 8.2-only
      # syntax (e.g. class-level `readonly` modifier) sneaking into output
      # that the php-class package claims is 8.1-compatible. 8.2 is the
      # version the smoke test uses below; pin it explicitly so a future
      # default-version bump doesn't silently change what we test.
      #
      # php-domain-class-showcase is excluded from the 8.1 + 8.2 lints
      # because it emits PHP 8.4 syntax (property hooks) that those PHPs
      # can't even parse. It has its own 8.4 lint + smoke run below.
      - name: Set up PHP 8.1 (floor)
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.1"
          tools: composer:v2

      - name: Lint emitted PHP under PHP 8.1 (matches php-class documented floor)
        run: |
          set -e
          find examples/php/class-showcase/generated -name "*.php" -type f -print0 \
            | xargs -0 -n1 php -l

      - name: Set up PHP 8.2 (matches php-readonly floor + smoke test target)
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          tools: composer:v2

      - name: Lint emitted PHP under PHP 8.2 + drift check
        run: |
          set -e
          echo "::group::php -l every emitted .php file"
          find examples/php/class-showcase/generated -name "*.php" -type f -print0 \
            | xargs -0 -n1 php -l
          echo "::endgroup::"
          echo "::group::Drift check (regenerated output must match committed)"
          git diff --exit-code examples/php/class-showcase/generated
          echo "::endgroup::"

      # PSR-4 compliance: drop the showcase generated/ into a throwaway
      # composer project and run `composer dump-autoload --strict-psr`.
      # With --strict-psr, Composer exits non-zero on any file whose class
      # name doesn't match its file name (case-sensitive) or whose namespace
      # doesn't match the directory path. Then run the smoke script which
      # instantiates every generated class via the autoloader, exercises
      # `final readonly` enforcement, verifies `@hide` actually drops the
      # field from the constructor signature, and round-trips `json_encode`.
      # Together they prove the autoloader + runtime claims in the README.
      - name: Verify Composer PSR-4 compliance + run smoke script
        run: |
          set -e
          tmp="$(mktemp -d)"
          cp -r examples/php/class-showcase/generated "$tmp/src"
          mkdir -p "$tmp/scripts"
          cp examples/php/class-showcase/scripts/smoke.php "$tmp/scripts/smoke.php"
          cat > "$tmp/composer.json" <<'JSON'
          {
              "name": "polyprism/ci-compliance-check",
              "type": "library",
              "require": { "php": ">=8.2" },
              "autoload": { "psr-4": { "Generated\\": "src/" } }
          }
          JSON
          cd "$tmp"
          echo "::group::composer dump-autoload --strict-psr"
          composer dump-autoload --strict-psr --optimize
          echo "::endgroup::"
          echo "::group::Run smoke.php (instantiate + readonly + @hide + json_encode)"
          php scripts/smoke.php
          echo "::endgroup::"

      # PHP 8.4 cell: php-domain-class emits property-hook syntax that is
      # only valid on 8.4+. The smoke run for this showcase additionally
      # wires the polyprism/runtime Composer package in via a `path`
      # repository (mirroring how a downstream consumer would install it
      # from Packagist) so the property hooks actually execute and the
      # Coerce / Normalise contracts are verified end-to-end.
      - name: Set up PHP 8.4 (matches php-domain-class floor)
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          tools: composer:v2

      - name: Lint emitted PHP under PHP 8.4 + drift check (php-domain-class)
        run: |
          set -e
          echo "::group::php -l every emitted .php file"
          find examples/php/domain-class-showcase/generated -name "*.php" -type f -print0 \
            | xargs -0 -n1 php -l
          echo "::endgroup::"
          echo "::group::Drift check (regenerated output must match committed)"
          git diff --exit-code examples/php/domain-class-showcase/generated
          echo "::endgroup::"

      - name: Verify Composer PSR-4 compliance + run domain-class smoke
        run: |
          set -e
          tmp="$(mktemp -d)"
          cp -r examples/php/domain-class-showcase/generated "$tmp/src"
          cp -r packages/runtime-php "$tmp/runtime"
          rm -rf "$tmp/runtime/vendor" "$tmp/runtime/composer.lock"
          mkdir -p "$tmp/scripts"
          cp examples/php/domain-class-showcase/scripts/smoke.php "$tmp/scripts/smoke.php"
          cat > "$tmp/composer.json" <<'JSON'
          {
              "name": "polyprism/ci-domain-class-check",
              "type": "project",
              "require": {
                  "php": ">=8.4",
                  "polyprism/runtime": "@dev"
              },
              "repositories": [
                  { "type": "path", "url": "./runtime", "options": { "symlink": true } }
              ],
              "autoload": { "psr-4": { "Generated\\": "src/" } },
              "minimum-stability": "dev",
              "prefer-stable": true
          }
          JSON
          cd "$tmp"
          echo "::group::composer install (with polyprism/runtime via path repo)"
          composer install --no-progress
          echo "::endgroup::"
          echo "::group::composer dump-autoload --strict-psr"
          composer dump-autoload --strict-psr --optimize
          echo "::endgroup::"
          echo "::group::Run smoke.php (hooks fire + coerce + normalise + JsonType + @hide + json_encode)"
          php scripts/smoke.php
          echo "::endgroup::"

      - name: Run PHPUnit on polyprism/runtime
        run: |
          set -e
          cd packages/runtime-php
          composer install --no-progress
          vendor/bin/phpunit
