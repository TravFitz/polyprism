# Publishes the `polyprism/runtime` Composer package to Packagist by
# splitting `packages/runtime-php/` out of this monorepo into a standalone
# GitHub repo (`polyprism-runtime-php`) and tagging the new release there.
# Packagist watches that standalone repo and auto-publishes on tag push.
#
# Triggered manually via the Actions UI — pick the version you want to
# ship (e.g. "0.2.0"), the action does the rest. Manual dispatch (vs auto
# on every push to `packages/runtime-php/**`) is deliberate: the npm and
# Composer release cadences don't have to march in lockstep, and an
# automated-on-every-push pipeline would publish patch versions every
# time the runtime got even a doc tweak. Manual = "I'm explicitly cutting
# a Composer release."
#
# **One-time setup before the first run** (see RELEASE.md for the full
# walk-through, summarised here):
#
#   1. Create the standalone GitHub repo `TravFitz/polyprism-runtime-php`
#      (empty, no README or license — the split populates it).
#   2. Generate a Personal Access Token with `repo` scope, scoped to the
#      standalone repo only. Add it as `RUNTIME_PHP_PUSH_TOKEN` in this
#      repo's secrets (Settings → Secrets and variables → Actions).
#   3. After the first successful run, submit
#      https://github.com/TravFitz/polyprism-runtime-php to Packagist and
#      enable the GitHub webhook so subsequent runs auto-publish without
#      manual nudging.

name: Release polyprism/runtime to Packagist

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'SemVer version to tag on the standalone repo (without the "v" prefix). Example: 0.2.0'
        required: true
        type: string
      dry_run:
        description: 'Dry-run mode (split the directory but skip the push + tag)'
        required: false
        type: boolean
        default: false

# One Composer release at a time — same group key as the npm release
# workflow so they queue rather than race if both fire.
concurrency:
  group: release-${{ github.workflow }}
  cancel-in-progress: false

jobs:
  split:
    name: Split + tag + push to standalone repo
    runs-on: ubuntu-latest
    steps:
      - name: Checkout monorepo (full history — subtree split needs it)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate version input
        # SemVer-shape sanity check so a typo doesn't push a malformed tag
        # to the standalone repo (which would then poison Packagist's
        # version list). Two-three numeric components, optional pre-release.
        run: |
          set -e
          v='${{ github.event.inputs.version }}'
          if ! echo "$v" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$'; then
            echo "::error::Version '$v' is not a valid SemVer string (e.g. 0.2.0 or 0.3.0-rc.1)" >&2
            exit 1
          fi
          echo "Version validated: $v"

      - name: Run a sanity smoke locally before publishing
        # Belt-and-braces: PHP 8.4 + PHPUnit against the runtime BEFORE
        # we tag a release. The main CI already runs this on every push,
        # but verifying it here too means a broken runtime can't reach
        # Packagist even if main has somehow drifted.
        run: |
          set -e
          # PHP setup — match the runtime's documented floor
          curl -fsSL https://github.com/shivammathur/setup-php/raw/main/src/scripts/docker-install.sh -o /tmp/setup-php.sh 2>/dev/null || true

      - name: Set up PHP 8.4 (matches the runtime floor)
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          tools: composer:v2

      - name: PHPUnit against the runtime
        working-directory: packages/runtime-php
        run: |
          composer install --no-progress --no-interaction
          vendor/bin/phpunit

      - name: Split packages/runtime-php into the standalone repo + tag
        if: ${{ github.event.inputs.dry_run != 'true' }}
        uses: symplify/monorepo-split-github-action@v2.3.0
        env:
          GITHUB_TOKEN: ${{ secrets.RUNTIME_PHP_PUSH_TOKEN }}
        with:
          tag: v${{ github.event.inputs.version }}
          package_directory: packages/runtime-php
          repository_organization: TravFitz
          repository_name: polyprism-runtime-php
          # Branch on the standalone repo to push to. The action force-pushes
          # this branch on every run so it always reflects the latest
          # monorepo state at split time.
          branch: main
          user_name: github-actions[bot]
          user_email: 41898282+github-actions[bot]@users.noreply.github.com

      - name: Dry-run smoke (split but skip push)
        if: ${{ github.event.inputs.dry_run == 'true' }}
        run: |
          echo "::notice::Dry-run mode — skipping the split-and-push step."
          echo "::notice::Version that would have shipped: v${{ github.event.inputs.version }}"
          echo "::notice::Re-run without dry_run to actually publish."

      - name: Summary
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          {
            echo "## Composer release shipped"
            echo ""
            echo "- **Package:** polyprism/runtime"
            echo "- **Version:** v${{ github.event.inputs.version }}"
            echo "- **Standalone repo:** https://github.com/TravFitz/polyprism-runtime-php"
            echo "- **Packagist:** https://packagist.org/packages/polyprism/runtime"
            echo ""
            echo "Packagist should pick up the new tag within ~60s via the webhook. If the version doesn't appear, hit the **Update** button on the Packagist package page or re-trigger the webhook from the GitHub repo's Settings → Webhooks."
          } >> "$GITHUB_STEP_SUMMARY"
