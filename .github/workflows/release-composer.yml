# Publishes the `polyprism/runtime` Composer package to Packagist by
# splitting `packages/runtime-php/` out of this monorepo into a standalone
# GitHub repo (`polyprism-runtime-php`) and tagging the new release there.
# Packagist watches that standalone repo and auto-publishes on tag push.
#
# Two triggers — same workflow, same job, picks the version source based
# on which one fired:
#
#   1. **Tag push** (the routine path): push a tag named
#      `runtime-php-vX.Y.Z` to the monorepo's main and the workflow runs
#      automatically. Strips `runtime-php-v` off the tag name to get the
#      SemVer string. Intended use:
#
#          git tag runtime-php-v0.2.1
#          git push origin runtime-php-v0.2.1
#
#      The prefix exists so this trigger doesn't fire for the per-package
#      npm tags changesets creates (`@polyprism/runtime@0.2.1`) or any
#      other tag scheme. Only `runtime-php-v*` tags are signal.
#
#   2. **Workflow dispatch** (the override path): click "Run workflow" in
#      the Actions UI, type the version manually. Has a `dry_run` flag for
#      validating the workflow without actually publishing. Useful for
#      emergencies, recovering from a botched tag, or first-time testing.
#
# Why this isn't "auto-publish on every push to packages/runtime-php/**":
# every commit (including doc tweaks, comment edits, .gitignore changes)
# would become a Packagist release. Once published, version numbers can't
# be reused — so accidental releases pollute the version namespace
# forever. Tag-triggered keeps the "I'm shipping a release" decision
# explicit while still being one shell command end-to-end.
#
# **One-time setup before the first run** (see RELEASE.md for the full
# walk-through, summarised here):
#
#   1. Create the standalone GitHub repo `TravFitz/polyprism-runtime-php`
#      (empty, no README or license — the split populates it).
#   2. Generate a Personal Access Token with `repo` scope, scoped to the
#      standalone repo only. Add it as `RUNTIME_PHP_PUSH_TOKEN` in this
#      repo's secrets (Settings → Secrets and variables → Actions).
#   3. After the first successful run, submit
#      https://github.com/TravFitz/polyprism-runtime-php to Packagist and
#      enable the GitHub webhook so subsequent runs auto-publish without
#      manual nudging.

name: Release polyprism/runtime to Packagist

on:
  push:
    tags:
      # Routine release path — push a tag like `runtime-php-v0.2.1`.
      - "runtime-php-v*"
  workflow_dispatch:
    inputs:
      version:
        description: 'SemVer version to tag on the standalone repo (without the "v" prefix). Example: 0.2.0'
        required: true
        type: string
      dry_run:
        description: "Dry-run mode (split the directory but skip the push + tag). Only meaningful for workflow_dispatch."
        required: false
        type: boolean
        default: false

# One Composer release at a time — same group key as the npm release
# workflow so they queue rather than race if both fire.
concurrency:
  group: release-${{ github.workflow }}
  cancel-in-progress: false

jobs:
  split:
    name: Split + tag + push to standalone repo
    runs-on: ubuntu-latest
    steps:
      - name: Checkout monorepo (full history — subtree split needs it)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version
        # Single source of truth for the version, regardless of which
        # trigger fired:
        #   - workflow_dispatch → user-supplied input
        #   - push (tag)        → derived from the tag name by stripping
        #                          the `runtime-php-v` prefix
        # Both paths funnel through the same SemVer-shape validator so a
        # typo can't poison Packagist's version list either way.
        id: version
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            v='${{ github.event.inputs.version }}'
            source="workflow_dispatch input"
          else
            tag='${{ github.ref_name }}'
            v="${tag#runtime-php-v}"
            source="tag ${tag}"
          fi
          if ! echo "$v" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$'; then
            echo "::error::Version '$v' (from $source) is not a valid SemVer string (e.g. 0.2.0 or 0.3.0-rc.1)" >&2
            exit 1
          fi
          echo "version=$v" >> "$GITHUB_OUTPUT"
          echo "source=$source" >> "$GITHUB_OUTPUT"
          echo "::notice::Resolved version v$v (from $source)"

      - name: Set up PHP 8.1 (matches the runtime's documented floor)
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.1"
          tools: composer:v2

      - name: PHPUnit against the runtime under PHP 8.1
        # Belt-and-braces: PHPUnit against the runtime under its documented
        # floor BEFORE we tag a release. The main CI already runs this on
        # every push, but verifying it here too means a broken runtime
        # (or one that's silently picked up an 8.2+/8.3+/8.4-only feature)
        # can't reach Packagist even if main has somehow drifted between
        # the tag and the workflow trigger.
        working-directory: packages/runtime-php
        run: |
          composer install --no-progress --no-interaction
          vendor/bin/phpunit

      - name: Split packages/runtime-php into the standalone repo + tag
        # Dry-run only applies to workflow_dispatch; tag-triggered runs
        # always publish (the tag is the intent signal).
        if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.dry_run != 'true' }}
        uses: symplify/monorepo-split-github-action@v2.3.0
        env:
          GITHUB_TOKEN: ${{ secrets.RUNTIME_PHP_PUSH_TOKEN }}
        with:
          tag: v${{ steps.version.outputs.version }}
          package_directory: packages/runtime-php
          repository_organization: TravFitz
          repository_name: polyprism-runtime-php
          # Branch on the standalone repo to push to. The action force-pushes
          # this branch on every run so it always reflects the latest
          # monorepo state at split time.
          branch: main
          user_name: github-actions[bot]
          user_email: 41898282+github-actions[bot]@users.noreply.github.com

      - name: Dry-run smoke (split but skip push)
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run == 'true' }}
        run: |
          echo "::notice::Dry-run mode — skipping the split-and-push step."
          echo "::notice::Version that would have shipped: v${{ steps.version.outputs.version }}"
          echo "::notice::Re-run without dry_run to actually publish."

      - name: Summary
        if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.dry_run != 'true' }}
        run: |
          {
            echo "## Composer release shipped"
            echo ""
            echo "- **Package:** polyprism/runtime"
            echo "- **Version:** v${{ steps.version.outputs.version }}"
            echo "- **Trigger:** ${{ steps.version.outputs.source }}"
            echo "- **Standalone repo:** https://github.com/TravFitz/polyprism-runtime-php"
            echo "- **Packagist:** https://packagist.org/packages/polyprism/runtime"
            echo ""
            echo "Packagist should pick up the new tag within ~60s via the webhook. If the version doesn't appear, hit the **Update** button on the Packagist package page or re-trigger the webhook from the GitHub repo's Settings → Webhooks."
          } >> "$GITHUB_STEP_SUMMARY"
